<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="500" height="700">
  <defs>
    <style>
      .pin-label { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:700; font-size:11px; fill:white; }
      .pin-label-sm { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:600; font-size:9.5px; fill:white; }
      .iata { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:700; font-size:8.5px; fill:#D4AF37; }
      .region { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-weight:600; font-size:10px; fill:rgba(255,255,255,0.28); letter-spacing:3; }
      .arctic-label { font-family: 'Montserrat','Helvetica Neue',Arial,sans-serif; font-size:8.5px; font-style:italic; fill:#D4AF37; opacity:0.75; }
    </style>
  </defs>

  <!-- Sea background -->
  <rect width="500" height="700" fill="#C8DDE8"/>

  <!-- Finland land (simplified clockwise from SW/Hanko) -->
  <path d="M143,670 L227,656 L309,636 L351,629
           L363,595 L388,588 L442,536 L467,487
           L437,435 L417,413 L391,347 L404,265
           L383,218 L391,121
           L341,0 L300,21 L258,42 L83,83 L29,121
           L175,157 L179,198 L186,238 L175,267 L193,298
           L248,350 L207,372 L150,428 L88,478
           L79,533 L95,585 L82,608 L79,630 L115,652 L143,670 Z"
        fill="#2D5A3D"/>

  <!-- Neighbour labels (sea) -->
  <text x="36" y="450" class="region" transform="rotate(-90,36,450)">SWEDEN</text>
  <text x="470" y="310" class="region">RUSSIA</text>
  <text x="55" y="60" class="region">NORWAY</text>

  <!-- Arctic Circle dashed line at y=234 (66.56°N) -->
  <line x1="0" y1="234" x2="500" y2="234" stroke="#D4AF37" stroke-width="1.2" stroke-dasharray="7,5" opacity="0.65"/>
  <text x="10" y="229" class="arctic-label">Arctic Circle 66.5°N</text>

  <!-- Region watermarks -->
  <text x="185" y="185" class="region" text-anchor="middle">LAPLAND</text>
  <text x="320" y="490" class="region" text-anchor="middle">LAKELAND</text>
  <text x="200" y="630" class="region" text-anchor="middle">SOUTH</text>

  <!-- ── FLIGHT ROUTES from HEL (faint dashed gold) ── -->
  <line x1="227" y1="648" x2="264" y2="238" stroke="#D4AF37" stroke-width="0.9" stroke-dasharray="5,4" opacity="0.35"/>
  <line x1="227" y1="648" x2="222" y2="158" stroke="#D4AF37" stroke-width="0.9" stroke-dasharray="5,4" opacity="0.35"/>
  <line x1="227" y1="648" x2="330" y2="100" stroke="#D4AF37" stroke-width="0.9" stroke-dasharray="5,4" opacity="0.35"/>

  <!-- ── AIRPORTS (diamond ◆) ── -->
  <!-- HEL – Helsinki-Vantaa -->
  <polygon points="227,636 234,643 227,650 220,643" fill="#D4AF37" stroke="white" stroke-width="1.2"/>
  <text x="238" y="647" class="iata">HEL</text>

  <!-- RVN – Rovaniemi -->
  <polygon points="264,238 271,245 264,252 257,245" fill="#D4AF37" stroke="white" stroke-width="1.2"/>
  <text x="274" y="249" class="iata">RVN</text>

  <!-- KTT – Kittilä (near Levi) -->
  <polygon points="222,158 229,165 222,172 215,165" fill="#D4AF37" stroke="white" stroke-width="1.2"/>
  <text x="168" y="170" class="iata" text-anchor="end">KTT</text>

  <!-- IVL – Ivalo (near Saariselkä) -->
  <polygon points="330,100 337,107 330,114 323,107" fill="#D4AF37" stroke="white" stroke-width="1.2"/>
  <text x="320" y="98" class="iata" text-anchor="end">IVL</text>

  <!-- ── DESTINATION PINS ── -->
  <!-- Helsinki -->
  <circle cx="227" cy="656" r="5.5" fill="#D4AF37" stroke="white" stroke-width="1.8"/>
  <text x="219" y="671" class="pin-label" text-anchor="middle">Helsinki</text>

  <!-- Järvisydän / Rantasalmi -->
  <circle cx="366" cy="530" r="5" fill="#D4AF37" stroke="white" stroke-width="1.8"/>
  <text x="376" y="527" class="pin-label-sm">Järvisydän</text>

  <!-- Tahko -->
  <circle cx="352" cy="449" r="4.5" fill="#D4AF37" stroke="white" stroke-width="1.8"/>
  <text x="362" y="453" class="pin-label-sm">Tahko</text>

  <!-- Rovaniemi -->
  <circle cx="260" cy="260" r="5.5" fill="#D4AF37" stroke="white" stroke-width="1.8"/>
  <text x="250" y="276" class="pin-label" text-anchor="middle">Rovaniemi</text>

  <!-- Pyhä-Luosto -->
  <circle cx="312" cy="203" r="4.5" fill="#D4AF37" stroke="white" stroke-width="1.8"/>
  <text x="322" y="207" class="pin-label-sm">Pyhä-Luosto</text>

  <!-- Levi -->
  <circle cx="222" cy="152" r="5.5" fill="#D4AF37" stroke="white" stroke-width="1.8"/>
  <text x="212" y="143" class="pin-label" text-anchor="end">Levi</text>

  <!-- Saariselkä -->
  <circle cx="331" cy="110" r="5" fill="#D4AF37" stroke="white" stroke-width="1.8"/>
  <text x="321" y="101" class="pin-label-sm" text-anchor="end">Saariselkä</text>

</svg>
